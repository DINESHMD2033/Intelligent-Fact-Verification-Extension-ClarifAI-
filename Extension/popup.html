<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>ClarifAI - Fact Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            width: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0;
        }
        
        .container {
            background: white;
            border-radius: 0;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .header-content {
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 24px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            background: #f9fafb;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            border-left: 5px solid #6b7280;
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result.true {
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
            border-left-color: #10b981;
        }
        
        .result.false {
            background: linear-gradient(135deg, #fef2f2 0%, #ffffff 100%);
            border-left-color: #ef4444;
        }
        
        .result.partially_true {
            background: linear-gradient(135deg, #fffbeb 0%, #ffffff 100%);
            border-left-color: #f59e0b;
        }
        
        .result.unverifiable {
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
            border-left-color: #6b7280;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .result-prediction {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .result-confidence {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .result-explanation {
            font-size: 13px;
            line-height: 1.5;
            color: #4b5563;
            margin-bottom: 12px;
        }
        
        .btn-wrong-claim {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        
        .btn-wrong-claim:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }
        
        .hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            line-height: 1.5;
        }
        
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .footer {
            padding: 16px 24px;
            background: #f9fafb;
            text-align: center;
            font-size: 11px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>🔍 ClarifAI</h1>
                <p class="subtitle">Advanced Fact-Checking Engine</p>
            </div>
        </div>
        
        <div class="content">
            <div id="status" class="status connected" style="display: none;">
                ✅ Connected to API
            </div>
            
            <div class="input-group">
                <label for="test-claim">Enter Claim to Verify</label>
                <textarea 
                    id="test-claim" 
                    placeholder="Paste any claim or select text on the page..."
                ></textarea>
            </div>
            
            <button id="verify-btn" class="btn-primary">
                <span>🔍</span>
                <span>Verify Claim</span>
            </button>
            
            <button id="analyze-page-btn" class="btn-secondary" style="margin-top: 12px;">
                <span>📄</span>
                <span>Analyze Current Page</span>
            </button>
            
            <button id="toggle-widget-btn" class="btn-tertiary" style="margin-top: 8px;">
                <span>🔲</span>
                <span>Toggle Extension Widget</span>
            </button>
            
            <div id="result" style="display: none;"></div>
            
            <div class="hint">
                💡 <strong>Tip:</strong> Select text on any webpage and click the extension icon to auto-analyze it.
            </div>
        </div>
        
        <div class="footer">
            Powered by Advanced AI Analysis • ClarifAI v2.0
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
